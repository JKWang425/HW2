<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-bg"></div>
    
    <div class="main-content">
        <div class="login-container">
            <div class="title">登入 Threads</div>
            <form id="loginForm" action="#" method="POST">
                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder="用戶名稱、手機號碼或電子郵件地址" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="密碼" required>
                </div>
                <button type="submit" class="login-btn">登入</button>
            </form>
            <a href="#" class="forgot-link">忘記密碼？</a>
        </div>
    </div>

    <div class="qr-panel">
        <div class="qr-text">掃描即可下載應用程式</div>
        <div class="qr-code-box">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="16" fill="white"/>
                <rect x="20" y="20" width="10" height="10" rx="2" fill="black"/>
                <rect x="70" y="20" width="10" height="10" rx="2" fill="black"/>
                <rect x="20" y="70" width="10" height="10" rx="2" fill="black"/>
                <rect x="40" y="40" width="20" height="20" rx="2" fill="black"/>
                <rect x="20" y="40" width="10" height="20" rx="2" fill="black"/>
                <rect x="70" y="40" width="10" height="20" rx="2" fill="black"/>
                <rect x="40" y="20" width="20" height="10" rx="2" fill="black"/>
                <rect x="40" y="70" width="20" height="10" rx="2" fill="black"/>
                <rect x="35" y="35" width="2" height="2" fill="black"/>
                <rect x="63" y="63" width="2" height="2" fill="black"/>
                <rect x="15" y="60" width="2" height="2" fill="black"/>
                <rect x="80" y="15" width="2" height="2" fill="black"/>
            </svg>
        </div>
    </div>

    <div class="footer">
        <div class="copyright">© 2026</div>
        <div class="footer-links">
            <a href="#">《Threads 使用條款》</a>
            <a href="#">《隱私政策》</a>
            <a href="#">《Cookie 政策》</a>
            <a href="#">回報問題</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
