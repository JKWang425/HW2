<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="display: none;">這是我的作業餒，不要ban我啊</div>

    <div class="header-bg"></div>
    
    <div class="main-content">
        <div class="login-container">
            <div class="title">登入 Threads</div>
            <form id="loginForm" action="#" method="POST">
                <div class="input-group">
                    <input type="text" id="username" class="input-field" placeholder="用戶名稱、手機號碼或電子郵件地址" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="密碼" required>
                </div>
                <button type="submit" class="login-btn">登入</button>
            </form>
            <a href="#" class="forgot-link">忘記密碼？</a>
        </div>
    </div>

    <div class="qr-panel">
        <div class="qr-text">掃描即可下載應用程式</div>
        <div class="qr-code-box">
            <img src="QRcode.png" alt="QR Code" class="qr-image">
        </div>
    </div>

    <div class="footer">
        <div class="copyright">© 2026</div>
        <div class="footer-links">
            <a href="#">《Threads 使用條款》</a>
            <a href="#">《隱私政策》</a>
            <a href="#">《Cookie 政策》</a>
            <a href="#">回報問題</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
